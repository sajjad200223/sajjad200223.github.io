<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>❤️</title>
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}
body{
background:#000;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
font-family:tahoma;
}
img{
width:100%;
height:100%;
object-fit:cover;
position:absolute;
}
.overlay{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.25);
}
.text{
position:absolute;
top:40px;
width:100%;
text-align:center;
font-size:45px;
font-weight:bold;
color:white;
text-shadow:2px 2px 10px black;
}
.text span{
color:#ff2d55;
}
</style>
</head>
<body>

<img src="https://picsum.photos/1080/1920" alt="">

<div class="overlay"></div>

<div class="text">
من <span>دوست دختر</span> دارم ❤️<br>
مزاحم نشو
</div>

</body>
</html>
